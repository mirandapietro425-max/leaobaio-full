services:
  - type: web
    name: leaobaio-store
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: SESSION_SECRET
        generateValue: true   # Render gera automaticamente
    disk:
      name: leaobaio-data
      mountPath: /opt/render/project/src
      sizeGB: 1               # Persiste uploads e banco de dados
